<!DOCTYPE html>
<html>
<head>
  <title>Catatan Teknisi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      margin: 0;
    }

    .box {
      max-width: 400px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 10px;
    }

    #more {
      display: none;
    }

    .link {
      text-align: center;
      margin: 10px;
      color: #007bff;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>⚡ Catatan Cepat</h2>

  <input type="text" id="ket" placeholder="Keterangan">
  <input type="number" id="harga" placeholder="Harga">

  <div class="link" onclick="toggle()">+ Detail</div>

  <div id="more">
    <input type="text" id="nama" placeholder="Nama">
    <input type="text" id="tlp" placeholder="No Tlp">
    <input type="text" id="tipe" placeholder="Tipe Device">
  </div>

  <button onclick="kirim()">SIMPAN</button>

  <p id="status"></p>
</div>

<script>
function toggle() {
  let m = document.getElementById("more");
  m.style.display = m.style.display === "none" ? "block" : "none";
}

function kirim() {
  let ket = document.getElementById("ket").value;
  let harga = document.getElementById("harga").value;
  let nama = document.getElementById("nama").value;
  let tlp = document.getElementById("tlp").value;
  let tipe = document.getElementById("tipe").value;
  let tanggal = new Date().toLocaleDateString("id-ID");

  let url = "https://script.google.com/macros/s/AKfycbxOlD83BRXuMROhbkt64eT98kw4XBaGlYCEj2JF3NiTHVpIgCuefIeThMLJbjgWDdYVsw/exec"
    + "?tanggal=" + tanggal
    + "&ket=" + encodeURIComponent(ket)
    + "&harga=" + harga
    + "&nama=" + encodeURIComponent(nama)
    + "&tlp=" + tlp
    + "&tipe=" + encodeURIComponent(tipe);

  fetch(url)
    .then(res => res.text())
    .then(res => {
      document.getElementById("status").innerText = "✅ Tersimpan";

      document.getElementById("ket").value = "";
      document.getElementById("harga").value = "";
      document.getElementById("nama").value = "";
      document.getElementById("tlp").value = "";
      document.getElementById("tipe").value = "";
    });
}
</script>

</body>
</html>
